{{- if .Values.run.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "swordfish-autoresearch.jobName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "swordfish-autoresearch.labels" . | nindent 4 }}
    kueue.x-k8s.io/queue-name: {{ .Values.run.queue }}
    kueue.x-k8s.io/priority-class: {{ .Values.run.priorityClass }}
spec:
  backoffLimit: {{ .Values.run.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.run.ttlSecondsAfterFinished }}
  activeDeadlineSeconds: {{ .Values.run.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "swordfish-autoresearch.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      {{- with .Values.run.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.run.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: profiler
          image: {{ .Values.run.image }}
          imagePullPolicy: {{ .Values.run.imagePullPolicy }}
          # The image's ENTRYPOINT is /usr/local/bin/swordfish-autoresearch
          # (see deploy/image/Dockerfile). All control is via env vars.
          env:
            - name: REF
              value: {{ .Values.run.ref | quote }}
            - name: SHAPES
              value: {{ .Values.run.shapes | quote }}
            - name: IMPLS
              value: {{ .Values.run.impls | quote }}
            - name: REPEATS
              value: {{ .Values.run.repeats | quote }}
            - name: REPO
              value: {{ .Values.run.repo | quote }}
            - name: MARLIN_SHA
              value: {{ .Values.run.marlinSha | quote }}
            - name: BRANCH_PREFIX
              value: {{ .Values.run.branchPrefix | quote }}
            - name: PR_DRAFT
              value: {{ .Values.run.prDraft | quote }}
            - name: GIT_USER_EMAIL
              value: {{ .Values.run.gitUser.email | quote }}
            - name: GIT_USER_NAME
              value: {{ .Values.run.gitUser.name | quote }}
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.run.ghTokenSecret.name }}
                  key: {{ .Values.run.ghTokenSecret.key }}
          # GPU is requested via DRA only — see resourceClaims at pod spec
          # level below. We deliberately do NOT set `nvidia.com/gpu: N` in
          # limits/requests (legacy device-plugin path), because mixing the
          # two on a DRA-enabled cluster causes the scheduler to over-count
          # GPU usage and never schedules. The container references the DRA
          # claim by name via `resources.claims[]`, which is the v1.32+ way.
          resources:
            claims:
              - name: gpu
            requests:
              cpu: {{ .Values.run.resources.cpuRequest | quote }}
              memory: {{ .Values.run.resources.memoryRequest }}
            limits:
              cpu: {{ .Values.run.resources.cpuLimit | quote }}
              memory: {{ .Values.run.resources.memoryLimit }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: data-nfs
              mountPath: /data-nfs
            - name: shm
              mountPath: /dev/shm
            - name: workspace
              mountPath: /work
      # DRA: claim a GPU via the cluster's existing ResourceClaimTemplate
      # ("full-gpu" by default). The container references this claim by
      # name in containers[].resources.claims[]. We use DRA exclusively;
      # no legacy nvidia.com/gpu device-plugin requests anywhere.
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: {{ .Values.run.gpuClaim }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.run.dataPVC }}
        - name: data-nfs
          persistentVolumeClaim:
            claimName: {{ .Values.run.nfsPVC }}
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.run.shmSize }}
        - name: workspace
          emptyDir: {}
{{- end }}
