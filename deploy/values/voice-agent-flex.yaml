# voice-agent-flex (airun) — values overlay for swordfish-autoresearch.
#
# Apply with:
#   helm install swordfish-profile-$(date +%s) \
#     ./deploy/charts/swordfish-autoresearch \
#     -n ray \
#     -f ./deploy/values/voice-agent-flex.yaml
#
# airun-philosophy alignment (see ~/nonwork/kstack/skills/airun-triage):
#  * 5-layer stack is Ray / Kueue / k8s-scheduler / GPU·MIG / node-pool. We
#    deliberately bypass L1 (Ray): single-GPU run-to-completion is plain Job.
#  * L2 (Kueue): we route via training-queue → gpu-cluster-queue. The CQ on
#    voice-agent-flex covers cpu, memory, nvidia.com/gpu — DRA claims aren't
#    a covered resource yet (DRAExtendedResources requires deviceClassMappings
#    config that voice-agent has deferred). So Kueue admits us on CPU/memory
#    only; the DRA scheduler does the actual A100 placement at L3/L4.
#  * L4 (GPU/MIG): we ask for `full-gpu` not a MIG slice. MIG would distort
#    roofline (different SM count + L2 + HBM bandwidth ratio per slice) and
#    invalidate comparisons against Marlin's published numbers. For decode
#    profiling at batch 1-16 we *want* the unsharded card.
#  * L5 (node pool): nodeSelector agentpool=gpu + toleration sku=gpu match
#    the gpu-a100-full ResourceFlavor exactly, so Kueue admission and
#    scheduler placement agree.
#
# Reuses these voice-agent-flex objects already in `ray` namespace:
#   * Secret: gh-token         (PAT for opening PRs back to chokevin/swordfish)
#   * PVC:    blob-training    (long-term artifact archive at /data)
#   * PVC:    training-nfs     (faster local archive at /data-nfs)
#   * RCT:    full-gpu         (DRA template for one full A100)
#   * LQ:     training-queue   (→ gpu-cluster-queue, 16 A100 GPU quota)
#   * PC:     eval-priority    (preemptible by everything; correct for diag)

run:
  enabled: true

  # Image — `:latest` is intentionally re-pulled every run because we iterate
  # on the image often. Pin to a `:sha-<7char>` tag for a reproducible run.
  image: ghcr.io/chokevin/swordfish-autoresearch:latest
  imagePullPolicy: Always

  # Profiling target
  ref: main
  shapes: voice
  impls: "fp16,marlin"
  repeats: "5"

  # MultiKueue routing — manager-side localQueue, federated to A100 workers
  queue: training-queue
  priorityClass: eval-priority      # one-shot diagnostic, not a real training job

  # Cluster-installed names
  gpuClaim: full-gpu                # one full A100 from the DRA pool
  dataPVC: blob-training            # /data — Azure Blob CSI
  nfsPVC: training-nfs              # /data-nfs — long-term archive
  ghTokenSecret:
    name: gh-token
    key: token

  nodeSelector:
    agentpool: gpu
  tolerations:
    - key: sku
      operator: Equal
      value: gpu
      effect: NoSchedule
    # The actual taint on aks-gpu-* nodes (gpu-operator default), not just sku=gpu.
    # Voice-agent's running pods carry both; we mirror them.
    - key: nvidia.com/gpu
      operator: Equal
      value: "true"
      effect: NoSchedule

  # Lean — entrypoint shell + Python at idle is ~2 CPU / 4Gi. Headroom for
  # nsys ingestion (peaks ~8GB) and ncu-rep (~1GB). Stay polite citizens of
  # gpu-cluster-queue (94 CPU / 1800Gi quota in gpu-a100-full flavor).
  resources:
    cpuRequest: "2"
    cpuLimit: "8"
    memoryRequest: "16Gi"
    memoryLimit: "48Gi"
  shmSize: "16Gi"

  prDraft: true
  branchPrefix: "autoresearch/profile"
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 86400
