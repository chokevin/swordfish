# swordfish-bench-a100.yaml — A100 SXM4-80GB on voice-agent-flex.
#
# Adds SYS_ADMIN container capability so Nsight Compute can read GPU
# performance counters. The DCGM exporter must be paused on the target
# A100 nodes during the NCU window — run `make airun-a100-ncu-preflight`
# (or the rune equivalent once wired) before the first submit.
#
# DRAFT — see swordfish-bench-base.yaml header.

schema_version: 1

extends: swordfish-bench-base

metadata:
  name: swordfish-bench-a100
  description: A100 SXM4-80GB swordfish benchmark on voice-agent-flex (ray/kernel-mode-training).

spec:
  scheduling:
    nodeSelector:
      agentpool: gpu
      nvidia.com/mig.config: all-disabled
    tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
    containerSecurityContext:
      capabilities:
        add:
          - SYS_ADMIN

  env:
    SWORDFISH_ARCH_LABEL: a100
