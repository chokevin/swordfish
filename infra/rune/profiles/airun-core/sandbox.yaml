# ai-sandbox-gpu-s — sandbox lane, size S, TTL-bounded interactive GPU session
apiVersion: airun.aks.io/v1alpha1
kind: Profile
metadata:
  name: ai-sandbox-gpu-s
  labels: { airun.aks.io/catalog: core, airun.aks.io/lane: sandbox, airun.aks.io/size: s }
spec:
  lane: sandbox
  queue: { clusterQueue: sandbox-cq, localQueue: sandbox-queue }
  scheduling:
    # V0: piggyback on train nodes. V1: dedicated sandbox pool if needed.
    nodeSelector: { airun.aks.io/lane: train }
    tolerations:
      - { key: airun.aks.io/lane, operator: Equal, value: train, effect: NoSchedule }
    priorityClassName: airun-sandbox-low
  resources:
    gpu: { size: s, memoryGiBMin: 8 }
    dra: { deviceClass: gpu.nvidia.com, claimTemplate: mig-1g10gb }
    requests: { cpu: "2", memory: 8Gi }
    persistence:
      pvcName: airun-sandbox-home
      mountPath: /home/researcher
  runtime: { imagePullPolicy: IfNotPresent }
  policy:
    preemptable: true
    ttlSeconds: 28800
    idleTimeoutSeconds: 3600
---
