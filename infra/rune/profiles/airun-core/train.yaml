---
# ai-batch-gpu-s — train lane, size S (MIG 1g). For evals, backfill, dataset scoring.
apiVersion: airun.aks.io/v1alpha1
kind: Profile
metadata:
  name: ai-batch-gpu-s
  labels: { airun.aks.io/catalog: core, airun.aks.io/lane: train, airun.aks.io/size: s }
spec:
  lane: train
  queue: { clusterQueue: training-cq, localQueue: eval-queue }
  scheduling:
    nodeSelector: { airun.aks.io/lane: train }
    tolerations:
      - { key: airun.aks.io/lane, operator: Equal, value: train, effect: NoSchedule }
    priorityClassName: airun-eval-default
  resources:
    gpu: { size: s, memoryGiBMin: 8 }
    dra: { deviceClass: gpu.nvidia.com, claimTemplate: mig-1g10gb }
    requests: { cpu: "2", memory: 8Gi }
  runtime: { imagePullPolicy: IfNotPresent }
  policy:
    preemptable: true
    maxQueueWaitSeconds: 600
