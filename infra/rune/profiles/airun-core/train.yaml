# ai-train-gpu-l — train lane, size L (full GPU), long-run capable
apiVersion: airun.aks.io/v1alpha1
kind: Profile
metadata:
  name: ai-train-gpu-l
  labels: { airun.aks.io/catalog: core, airun.aks.io/lane: train, airun.aks.io/size: l }
spec:
  lane: train
  queue: { clusterQueue: training-cq, localQueue: training-queue }
  scheduling:
    nodeSelector: { airun.aks.io/lane: train }
    tolerations:
      - { key: airun.aks.io/lane, operator: Equal, value: train, effect: NoSchedule }
    priorityClassName: airun-train-default
  resources:
    gpu: { size: l, memoryGiBMin: 60 }
    dra: { deviceClass: gpu.nvidia.com, claimTemplate: full-gpu }
    requests: { cpu: "16", memory: 64Gi }
  runtime: { imagePullPolicy: IfNotPresent }
  policy:
    preemptable: true
    maxQueueWaitSeconds: 3600
    checkpointOnPreempt: true
---
# ai-train-gpu-m — train lane, size M (MIG 3g equivalent). Default for LoRA/SFT.
apiVersion: airun.aks.io/v1alpha1
kind: Profile
metadata:
  name: ai-train-gpu-m
  labels: { airun.aks.io/catalog: core, airun.aks.io/lane: train, airun.aks.io/size: m }
spec:
  lane: train
  queue: { clusterQueue: training-cq, localQueue: training-queue }
  scheduling:
    nodeSelector: { airun.aks.io/lane: train }
    tolerations:
      - { key: airun.aks.io/lane, operator: Equal, value: train, effect: NoSchedule }
    priorityClassName: airun-train-default
  resources:
    gpu: { size: m, memoryGiBMin: 20 }
    dra: { deviceClass: gpu.nvidia.com, claimTemplate: mig-3g40gb }
