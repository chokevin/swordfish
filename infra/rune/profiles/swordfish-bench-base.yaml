# swordfish-bench-base.yaml — shared profile values for swordfish benchmarks
# on the voice-agent-flex AKS cluster.
#
# DRAFT (W1 Wed Apr 29 2026): the rune profile YAML schema is in
# applications/airun-zero/profiles/ (private). This file is built from rune
# binary strings + infra/airun/airun-gemm.voice-agent-flex.json. Validate
# with `rune profile show swordfish-bench-base` against a canonical
# airun-zero profile before first dispatch. Tracked as
# `rune-profile-schema-validation` in the swordfish todo list.
#
# Per-arch profiles extend this and override only:
#   * spec.scheduling.nodeSelector
#   * spec.scheduling.tolerations
#   * spec.scheduling.containerSecurityContext (A100 only, for NCU)
#   * metadata.name + the underlying queue if it ever differs

schema_version: 1

metadata:
  name: swordfish-bench-base
  description: |
    Shared swordfish benchmark profile for voice-agent-flex (ray namespace,
    kernel-mode-training, full-gpu DRA, training-nfs PVC mounted at /data-nfs).
    Per-arch profiles extend this file.

spec:
  context: voice-agent-flex
  namespace: ray

  kueue:
    queue: kernel-mode-training

  runtime:
    image: ghcr.io/chokevin/swordfish-bench:latest
    imagePullPolicy: IfNotPresent
    workingDir: /data-nfs/swordfish/src/current
    command: [bash]

  resources:
    gpusPerNode: 1
    cpuRequest: "8"
    memoryRequest: 64Gi
    cpuLimit: "16"
    memoryLimit: 128Gi

  scheduling:
    resourceClaims:
      - name: gpu
        resourceClaimTemplateName: full-gpu

  storage:
    volumes:
      - name: training-nfs
        persistentVolumeClaim:
          claimName: training-nfs
    volumeMounts:
      - name: training-nfs
        mountPath: /data-nfs

  env:
    SWORDFISH_RESULT_DIR: /data-nfs/swordfish/week1
    SWORDFISH_SOURCE_DIR: /data-nfs/swordfish/src/current
    REF: rune-managed
    PYTHONUNBUFFERED: "1"

  policy:
    terminationGracePeriodSeconds: 60
    backoffLimit: 0
    ttlSecondsAfterFinished: 86400
