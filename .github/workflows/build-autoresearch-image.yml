name: build-autoresearch-image

# Builds and pushes ghcr.io/chokevin/swordfish-autoresearch on changes to
# the image build context. Tags: branch name, short SHA, and `latest` on main.
#
# Note: the base is nvcr.io/nvidia/pytorch:24.05-py3 (~10GB), so this build
# is slow (~15-30min on ubuntu-latest). Marlin is baked at the pinned SHA in
# the Dockerfile, so the wheel build (CUDA compile) also runs here — runs
# without a GPU since nvcc only needs the toolkit, not a device.

on:
  push:
    branches: [main]
    paths:
      - "deploy/image/**"
      - ".github/workflows/build-autoresearch-image.yml"
  pull_request:
    branches: [main]
    paths:
      - "deploy/image/**"
      - ".github/workflows/build-autoresearch-image.yml"
  workflow_dispatch:
    inputs:
      marlin_sha:
        description: "Override MARLIN_SHA build arg"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/swordfish-autoresearch

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Reclaim ~30GB on the runner — base image is huge, and the default
      # ubuntu-latest image ships ~14GB of preinstalled tooling we don't need.
      - name: Free runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL
          docker image prune -af

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=pr

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./deploy/image
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ inputs.marlin_sha && format('MARLIN_SHA={0}', inputs.marlin_sha) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
